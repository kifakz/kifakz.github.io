// Функция поиска и подсветки ближайшего к центру блока
function updateActiveRow() {
    const rows = document.querySelectorAll('.prayer-row');
    let closestRow = null;
    let minDistance = Infinity;
    const viewportCenter = window.innerHeight / 2;

    rows.forEach(row => {
        const rect = row.getBoundingClientRect();
        const rowCenter = rect.top + rect.height / 2;
        const distance = Math.abs(viewportCenter - rowCenter);

        if (distance < minDistance) {
            minDistance = distance;
            closestRow = row;
        }
    });

    if (closestRow) {
        rows.forEach(row => row.classList.remove('active-reading'));
        closestRow.classList.add('active-reading');
    }
}

// Оптимизированный слушатель скролла
window.addEventListener('scroll', () => {
    window.requestAnimationFrame(updateActiveRow);
}, { passive: true });

// Инициализация при открытии страницы
window.addEventListener('load', updateActiveRow);

    // 2. ЛОГИКА МЕНЮ
    function toggleDropdown(button) {
        let dropdown = button.nextElementSibling;
        document.querySelectorAll(".dropdown-menu").forEach(menu => {
            if (menu !== dropdown) menu.classList.remove("show");
        });
        if(dropdown) dropdown.classList.toggle("show");

    // 3. ЗАГРУЗКА ФУТЕРА И ЦИТАТ (пути ведут на уровень выше ../)
    async function loadFooter() {
        try {
            const response = await fetch('../footer.html');
            document.getElementById('footer-container').innerHTML = await response.text();
            getRandomQuote();
        } catch (e) { console.error('Ошибка футера:', e); }
    }

    async function getRandomQuote() {
        try {
            const response = await fetch('../css/quotes.txt');
            const text = await response.text();
            const quotes = text.split('\n').filter(q => q.trim() !== '');
            if (quotes.length > 0) {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                document.getElementById('quote').innerHTML = quotes[randomIndex];
            }
        } catch (e) { console.error('Ошибка цитат:', e); }
    }

    // 4. РАДИО
    function loadRadio() {
        fetch('../radio.txt')
            .then(r => r.text())
            .then(url => {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = url.trim();
                const container = document.getElementById('radioContainer');
                container.innerHTML = '';
                container.appendChild(audio);
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadFooter();
        loadRadio();
