            {w: "בָּרוּךְ", p: "Бару́х", t: "Благословен"},
            {w: "אַתָּה", p: "Ата́", t: "Ты"},
            {w: "ה'", p: "А-дона́й", t: "Г-сподь"},
            {w: "הַמַּבְדִּיל", p: "а-мавди́ль", t: "разделяющий"},
            {w: "בֵּין", p: "бэн", t: "между"},
            {w: "קֹדֶשׁ", p: "кодэ́ш", t: "святым"},
            {w: "לְחוֹל", p: "ле-хо́ль", t: "и будничным"}
        ],
        tr: "Бару́х Ата́ А-дона́й амавди́ль бэн кодэ́ш лехо́ль",

            <p>Женщина может задуть свечу. Все желают друг другу:</p>

            <p>Хорошей недели!</p>
        `,
        hr: false
    }
];

const contentDiv = document.getElementById('prayer-content');

prayerData.forEach(item => {
// А) ПРОВЕРЯЕМ ПРОИЗВОЛЬНЫЙ HTML
    if (item.customHTML) {
        const customWrapper = document.createElement('div');
        customWrapper.innerHTML = item.customHTML;
        contentDiv.appendChild(customWrapper);
        return; // Заканчиваем с этим элементом и переходим к следующему
    }

    // 2. СОЗДАЕМ МОЛИТВУ
    const row = document.createElement('div');
    row.className = 'prayer-row';
    
    let hebrewHTML = '';
    item.hb_structured.forEach(part => {
        hebrewHTML += `
            <span class="hb-word">
                ${part.w}
                <span class="tooltip">
                    <span class="tooltip-translit">${part.p}</span>
                    <span class="tooltip-translation">${part.t}</span>
                </span>
            </span> `;
    });

    row.innerHTML = `
        <div class="hebrew">${hebrewHTML}</div>
        <div class="translit">${item.tr}</div>
        <div class="translation">${item.ru}</div>
    `;
    contentDiv.appendChild(row);

// 3. ПРОВЕРЯЕМ РАЗДЕЛИТЕЛЬ (hr)
    if (item.hr) {
        const spacer = document.createElement('div');
        spacer.className = 'spacer-hr'; // Создаем пустой блок для разрыва
        contentDiv.appendChild(spacer);
    }
	});
// Функция поиска и подсветки ближайшего к центру блока
function updateActiveRow() {
    const rows = document.querySelectorAll('.prayer-row');
    let closestRow = null;
    let minDistance = Infinity;
    const viewportCenter = window.innerHeight / 2;

    rows.forEach(row => {
        const rect = row.getBoundingClientRect();
        const rowCenter = rect.top + rect.height / 2;
        const distance = Math.abs(viewportCenter - rowCenter);

        if (distance < minDistance) {
            minDistance = distance;
            closestRow = row;
        }
    });

    if (closestRow) {
        rows.forEach(row => row.classList.remove('active-reading'));
        closestRow.classList.add('active-reading');
    }
}

// Оптимизированный слушатель скролла
window.addEventListener('scroll', () => {
    window.requestAnimationFrame(updateActiveRow);
}, { passive: true });

// Инициализация при открытии страницы
window.addEventListener('load', updateActiveRow);

    // 2. ЛОГИКА МЕНЮ
    function toggleDropdown(button) {
        let dropdown = button.nextElementSibling;
        document.querySelectorAll(".dropdown-menu").forEach(menu => {
            if (menu !== dropdown) menu.classList.remove("show");
        });
        if(dropdown) dropdown.classList.toggle("show");
    }

    // 3. ЗАГРУЗКА ФУТЕРА И ЦИТАТ (пути ведут на уровень выше ../)
    async function loadFooter() {
        try {
            const response = await fetch('../footer.html');
            document.getElementById('footer-container').innerHTML = await response.text();
            getRandomQuote();
        } catch (e) { console.error('Ошибка футера:', e); }
    }

    async function getRandomQuote() {
        try {
            const response = await fetch('../css/quotes.txt');
            const text = await response.text();
            const quotes = text.split('\n').filter(q => q.trim() !== '');
            if (quotes.length > 0) {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                document.getElementById('quote').innerHTML = quotes[randomIndex];
            }
        } catch (e) { console.error('Ошибка цитат:', e); }
    }

    // 4. РАДИО
    function loadRadio() {
        fetch('../radio.txt')
            .then(r => r.text())
            .then(url => {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = url.trim();
                const container = document.getElementById('radioContainer');
                container.innerHTML = '';
                container.appendChild(audio);
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadFooter();
        loadRadio();
    });
</script>
