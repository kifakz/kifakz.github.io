    .prayer-container {

    }


    /* Стили для пояснительного текста (инструкций) */
  .instruction-block {
    text-align: center;
    margin: 20px auto 40px;
    padding: 25px;
    background: rgba(211, 84, 0, 0.07); /* Совсем легкий оранжевый оттенок фона */

    max-width: 800px;
}

.instruction-block p { 
    font-style: normal; /* Убираем курсив */
    color: #e0e0e0;     /* Делаем текст почти белым для контраста */
    font-size: 1.2rem;  /* Увеличиваем размер */
    line-height: 1.6;   /* Увеличиваем межстрочный интервал */
    margin: 0;
}

/* Название заголовка внутри инструкции (если используешь h2 или h3) */
.instruction-block .section-title {
    color: #ff851b;
    font-size: 1.8rem;
    margin-bottom: 15px;
    font-weight: bold;
}

    /* Стили для строк молитвы */

/* Основной контейнер для строки молитвы (теперь это карточка) */
.prayer-row { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    text-align: center; 
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(5px);
    
    /* Делаем рамку очень тонкой и полупрозрачной */
    border: 1px solid rgba(255, 255, 255, 0.08); 
    border-radius: 20px;
    
    margin: 0 auto; 
    padding: 30px 25px; 
    max-width: 850px;
    position: relative; /* Для правильного наложения */
}

/* Убираем нижнее скругление и нижнюю рамку у промежуточных блоков */
.prayer-row:not(:last-child) {
    border-bottom: none;
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
    margin-bottom: 0; /* Убираем любой зазор */
}

/* Убираем верхнее скругление у блоков, идущих следом */
.prayer-row + .prayer-row {
    border-top-left-radius: 0;
    border-top-right-radius: 0;
    margin-top: -1px; /* Сдвигаем на 1 пиксель вверх, чтобы рамки слились */
}

/* Блок-разрыв (когда hr: true) */
.spacer-hr {
    height: 40px; 
    display: block;
    clear: both;
}

    .hebrew {

}

/* Компактный переключатель молитв */
.prayer-selector {
    text-align: center;
    margin: 20px 0 30px 0;
}

.custom-select {
    background: #2c3e50;
    color: #ecf0f1;
    padding: 10px 20px;
    border: 1px solid #d35400;
    border-radius: 25px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    cursor: pointer;
    outline: none;
    appearance: none; /* Убираем стандартную стрелку браузера */

    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d35400' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 15px center;
    background-size: 15px;
    padding-right: 40px;
    transition: all 0.3s ease;
}

.custom-select:hover {
    border-color: #ff851b;
    box-shadow: 0 0 10px rgba(211, 84, 0, 0.3);
}
/* Стиль для слов, которые можно перевести */
/* Базовое слово */
.hb-word {
    cursor: help;
    border-bottom: 2px dotted rgba(211, 84, 0, 0.5);
    transition: all 0.2s;
    position: relative;
    display: inline-block;
    padding: 0 2px;
}

.hb-word:hover {
    background: rgba(211, 84, 0, 0.15);
    border-bottom: 2px solid #ff851b;
    border-radius: 4px;
}

/* Контейнер подсказки */
.hb-word .tooltip {
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    background: #2c3e50; /* Темный фон, чтобы выделялся */
    border: 1px solid #d35400;
    color: white;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: 'Segoe UI', sans-serif;
    white-space: nowrap;
    text-align: center;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    z-index: 100;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
}

/* Треугольничек внизу подсказки */
.hb-word .tooltip::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 50%;
    margin-left: -5px;
    border-width: 5px;
    border-style: solid;
    border-color: #d35400 transparent transparent transparent;
}

.hb-word:hover .tooltip {
    opacity: 1;
    visibility: visible;
    bottom: 140%;
}

/* Стили внутри подсказки */
.tooltip-translit {
    color: #ff851b; /* Оранжевый для произношения */
    font-weight: bold;
    display: block;
    margin-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 4px;
}

.tooltip-translation {
    color: #ecf0f1; /* Белый для перевода */
    display: block;
    font-style: italic;
}
</style>

        let dropdown = button.nextElementSibling;
        document.querySelectorAll(".dropdown-menu").forEach(menu => {
            if (menu !== dropdown) menu.classList.remove("show");
        });
        if(dropdown) dropdown.classList.toggle("show");
    }

    // 3. ЗАГРУЗКА ФУТЕРА И ЦИТАТ (пути ведут на уровень выше ../)
    async function loadFooter() {
        try {
            const response = await fetch('../footer.html');
            document.getElementById('footer-container').innerHTML = await response.text();
            getRandomQuote();
        } catch (e) { console.error('Ошибка футера:', e); }
    }

    async function getRandomQuote() {
        try {
            const response = await fetch('../css/quotes.txt');
            const text = await response.text();
            const quotes = text.split('\n').filter(q => q.trim() !== '');
            if (quotes.length > 0) {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                document.getElementById('quote').innerHTML = quotes[randomIndex];
            }
        } catch (e) { console.error('Ошибка цитат:', e); }
    }

    // 4. РАДИО
    function loadRadio() {
        fetch('../radio.txt')
            .then(r => r.text())
            .then(url => {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = url.trim();
                const container = document.getElementById('radioContainer');
                container.innerHTML = '';
                container.appendChild(audio);
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadFooter();
        loadRadio();
    });
</script>
</body>
</html>
