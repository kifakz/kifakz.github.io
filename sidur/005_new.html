<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шабат — Сидур онлайн</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/2025styles.css?ver=1.021">
    
</head>
<body class="main-page">

<header>
    <div class="dropdown">
        <button><b><a href="https://kifakz.github.io/" class="no-underline">Главная</a></b></button>
    </div>
    <div class="dropdown">
        <button onclick="toggleDropdown(this)"><b><a href="https://kifakz.github.io/bible/stoliar/" class="no-underline">Тора для детей</a></b></button>
    </div>
    <div class="dropdown">
        <button onclick="toggleDropdown(this)"><b><a href="https://kifakz.github.io/bible/stern/index.html" class="no-underline">Еврейский Новый Завет</a></b></button>
    </div>
    <div class="dropdown">
        <button onclick="toggleDropdown(this)"><b><a href="https://kifakz.github.io/sidur/index.html" class="no-underline">Сидур</a></b></button>
    </div>
    <div class="dropdown">
        <button onclick="toggleDropdown(this)"><b>Радио EL-HI</b></button>
        <ul class="dropdown-menu">
            <li id="radioContainer">Загрузка...</li>
        </ul>
    </div>
</header>

<style>
    /* Основные настройки контейнера */
    .prayer-container { 
        max-width: 900px; 
        margin: 40px auto; 
        padding: 0 20px; 
        color: white; /* Весь текст по умолчанию светлый */
    }

    /* Стили для пояснительного текста (инструкций) */
  .instruction-block {
    text-align: center;
    margin: 20px auto 40px;
    padding: 25px;
    background: rgba(211, 84, 0, 0.07); /* Совсем легкий оранжевый оттенок фона */
    border-radius: 12px;
    border: 1px solid rgba(211, 84, 0, 0.2); /* Тонкая рамка вместо одной полосы слева */
    max-width: 800px;
}

.instruction-block p { 
    font-style: normal; /* Убираем курсив */
    color: #e0e0e0;     /* Делаем текст почти белым для контраста */
    font-size: 1.2rem;  /* Увеличиваем размер */
    line-height: 1.6;   /* Увеличиваем межстрочный интервал */
    margin: 0;
}

/* Название заголовка внутри инструкции (если используешь h2 или h3) */
.instruction-block .section-title {
    color: #ff851b;
    font-size: 1.8rem;
    margin-bottom: 15px;
    font-weight: bold;
}

    /* Стили для строк молитвы */
    .prayer-row { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        text-align: center; 
        margin-bottom: 50px; 
        padding-bottom: 25px; 
        border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
    }

    .hebrew { 
        font-family: 'Assistant', sans-serif; 
        font-size: 1.5rem;
        color: #ffffff; 
        direction: rtl; 
        line-height: 1.2;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .translit { 
        font-size: 1.4rem; 
        color: #ff851b; /* Более яркий оранжевый для черного фона */
        font-weight: bold; 
        margin: 15px 0 5px 0;
        letter-spacing: 0.5px;
    }

    .translation { 
        font-size: 1.2rem; 
        color: #ecf0f1; 
        font-family: 'Playfair Display', serif; 
        max-width: 80%;
    }

    .section-title { 
        text-align: center; 
        color: #d35400; 
        margin-bottom: 10px; 
        font-family: 'Playfair Display', serif; 
        font-size: 2rem;
    }
	/* Стили для выбора молитв */
.prayer-navigation {
    margin: 20px auto 40px;
    padding: 15px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    text-align: center;
}

.nav-title {
    font-family: 'Playfair Display', serif;
    color: #bdc3c7;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 15px;
    display: block;
}

.nav-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.nav-links a {
    color: #ecf0f1;
    text-decoration: none;
    padding: 5px 12px;
    border-radius: 5px;
    background: rgba(211, 84, 0, 0.1); /* Прозрачный оранжевый */
    border: 1px solid rgba(211, 84, 0, 0.3);
    font-size: 0.95rem;
    transition: all 0.3s ease;
}

.nav-links a:hover {
    background: #d35400;
    color: white;
    border-color: #d35400;
}

/* Компактный переключатель молитв */
.prayer-selector {
    text-align: center;
    margin: 20px 0 30px 0;
}

.custom-select {
    background: #2c3e50;
    color: #ecf0f1;
    padding: 10px 20px;
    border: 1px solid #d35400;
    border-radius: 25px;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    cursor: pointer;
    outline: none;
    appearance: none; /* Убираем стандартную стрелку браузера */
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d35400' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 15px center;
    background-size: 15px;
    padding-right: 40px;
    transition: all 0.3s ease;
}

.custom-select:hover {
    border-color: #ff851b;
    box-shadow: 0 0 10px rgba(211, 84, 0, 0.3);
}
</style>

<main>
    <div class="prayer-container">
 <div class="prayer-selector">
    <select class="custom-select" onchange="window.location.href=this.value">
        <option value="" disabled selected>Выбрать молитву...</option>
        <option value="016.html">Шахарит (утренняя составная)</option>
		<option value="014.html">Минха (дневная будничная)</option>
		<option value="009.html">Арвит (вечерняя составная)</option>
		<option value="001.html">Утренние благословения</option>
		<option value="002.html">Шма Исраэль</option>
		<option value="003.html">Адон олам</option>
		<option value="004.html">Шмонэ-Эсрэ</option>
		<option value="005.html">Суббота</option>
		<option value="006.html">Кадиш раввинов</option>
		<option value="007.html">Благословение вызванного к Торе</option>
		<option value="008.html">Ашрэй</option>
		<option value="010.html">Алэну лешабэах</option>
		<option value="011.html">Кадиш скорбящего</option>
		<option value="012.html">После трапезы с хлебом</option>
		<option value="013.html">Ханукальные свечи</option>
		<option value="015.html">Обручение и женитьба</option>
		<option value="017.html">Обрезание (брит мила)</option>
    </select>
</div>

        <div class="instruction-block">
            <h2 class="section-title">Начало субботы</h2>
            <p>В пятницу вечером женщина при зажигании свечей произносит:</p>
        </div>

        <div id="prayer-content"></div>
    </div>
</main>

<div id="footer-container"></div>

<script>
    // 1. ДАННЫЕ МОЛИТВЫ
const prayerData = [
        {
            hb: "בָּרוּךְ אַתָּה ה' אֱלֹהֵינוּ מֶלֶךְ הָעוֹלָם",
            tr: "Бару́х Ата́ А-дона́й Элоэ́ну Мэ́лэх аола́м",
            ru: "Благословен Ты, Г-сподь, наш Б-г, Царь вселенной"
        },
        {
            hb: "אֲשֶׁר קִדְּשָׁנוּ בְּמִצְוֹתָיו וְצִוָּנוּ לְהַדְלִיק נֵר שֶׁל שַׁבָּת",
            tr: "ашэ́р кидеша́ну бемицвота́в вецива́ну леадли́к нэр шэль шаба́т",
            ru: "освятивший нас Своими заповедями и повелевший нам зажигать свечу в честь субботы"
        }
    ];

    const contentDiv = document.getElementById('prayer-content');
    prayerData.forEach(item => {
        const row = document.createElement('div');
        row.className = 'prayer-row';
        row.innerHTML = `<div class="hebrew">${item.hb}</div><div class="translit">${item.tr}</div><div class="translation">${item.ru}</div>`;
        contentDiv.appendChild(row);
    });

    // 2. ЛОГИКА МЕНЮ
    function toggleDropdown(button) {
        let dropdown = button.nextElementSibling;
        document.querySelectorAll(".dropdown-menu").forEach(menu => {
            if (menu !== dropdown) menu.classList.remove("show");
        });
        if(dropdown) dropdown.classList.toggle("show");
    }

    // 3. ЗАГРУЗКА ФУТЕРА И ЦИТАТ (пути ведут на уровень выше ../)
    async function loadFooter() {
        try {
            const response = await fetch('../footer.html');
            document.getElementById('footer-container').innerHTML = await response.text();
            getRandomQuote();
        } catch (e) { console.error('Ошибка футера:', e); }
    }

    async function getRandomQuote() {
        try {
            const response = await fetch('../css/quotes.txt');
            const text = await response.text();
            const quotes = text.split('\n').filter(q => q.trim() !== '');
            if (quotes.length > 0) {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                document.getElementById('quote').innerHTML = quotes[randomIndex];
            }
        } catch (e) { console.error('Ошибка цитат:', e); }
    }

    // 4. РАДИО
    function loadRadio() {
        fetch('../radio.txt')
            .then(r => r.text())
            .then(url => {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.src = url.trim();
                const container = document.getElementById('radioContainer');
                container.innerHTML = '';
                container.appendChild(audio);
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadFooter();
        loadRadio();
    });
</script>
</body>
</html>
